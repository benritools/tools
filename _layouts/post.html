---
layout: default
---
<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "BlogPosting",
 "headline": "{{ page.title }}",
 "datePublished": "{{ page.date }}",
 "author": {
   "@type": "Person",
   "name": "BenriTools"
 },
 "url": "{{ page.url | absolute_url }}"
}
</script>

<article>

<h1>{{ page.title }}</h1>

<p>{{ page.date | date: "%Y-%m-%d" }}</p>

{{ content }}

</article>
