<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <base href="/tools/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>便利ツール集 | お問い合わせ</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
<div id="header"></div>
    <div class="layout">
      
    <!-- ページ本文 -->
      <div class="main">
    

      <section class="tool-section">
        <div class="column-article">
            <h3 class="article-h3">お問い合わせ</h3>
            <p>当サイトに関するご質問・ご意見などがございましたら、以下のGoogleフォームよりお問い合わせください。</p>
        
            <p>
              ▼ お問い合わせは<a href="https://forms.gle/jPr5KAzKbR7YraAK9" target="_blank">こちらから</a>
            </p>

            <p>
              通常、3営業日以内に返信させていただきます。<br>
            ※お問い合わせ時に送信いただいた個人情報は、お問い合わせ対応以外には使用いたしません。
            </p>

      </div>
      </section>
        
      </div>

      <!-- サイドメニュー -->
      <aside class="sidebar">
      
        <div class="sidebar-block">
          <h3 class="sidebar-title">人気ツール</h3>
          <div id="popular-tools"></div>
        </div>
      
        <div class="sidebar-block">
          <h3 class="sidebar-title">他のツール</h3>
          <div id="sidebar-tools"></div>
        </div>
      
      </aside>

</div>



  <!-- フッター -->
<div id="footer"></div>

<script src="./js/layout.js"></script>
<script src="./js/sidebar.js"></script>

<script>
    /* 要素の取得 */
    const textInput = document.getElementById('textInput');
    const includeSpaces = document.getElementById('includeSpaces');
    const includeLineBreaks = document.getElementById('includeLineBreaks');
    const includePunctuation = document.getElementById('includePunctuation');
    
    const charCount = document.getElementById('charCount');
    const paperCount = document.getElementById('paperCount');
    const readTime = document.getElementById('readTime');
    const xStatus = document.getElementById('xStatus');
    const instaStatus = document.getElementById('instaStatus');
          
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    
    /* 正規表現の定義 */
    const whitespaceRegex = /[ \u3000\t]/g; // 半角・全角スペースとタブ
    const lineBreakRegex = /\n/g;           // 改行
    //const punctuationRegex = /[。\u3001,.、]/g; // 句読点
    const punctuationRegex = /[。、\u3001,，.．]/g;
    
    /* カウント更新ロジック */
    function updateCount() {
      let text = textInput.value;
    
      // 各チェックボックスの状態に応じて文字を削除（フィルタリング）
      if (!includeSpaces.checked) {
        text = text.replace(whitespaceRegex, '');
      }
      
      if (!includeLineBreaks.checked) {
        text = text.replace(lineBreakRegex, '');
      }
    
      if (!includePunctuation.checked) {
        text = text.replace(punctuationRegex, '');
      }
    
      const count = text.length;
      
      // 表示の更新
      charCount.textContent = count;
      paperCount.textContent = (count / 400).toFixed(1);
      const seconds = Math.ceil((count / 400) * 60);
      readTime.textContent = seconds;
      
    // --- SNS制限判定の共通関数 ---
      const updateStatus = (element, limit, label = "あと ") => {
        const remaining = limit - count;
        if (remaining < 0) {
          element.innerHTML = `<span class="text-danger">超過 ${Math.abs(remaining)}</span>`;
        } else {
          element.textContent = label + remaining;
        }
      };
    
      // 各SNSへの適用
      updateStatus(xStatus, 140);      // X (旧Twitter)
      updateStatus(instaStatus, 2200); // Instagram キャプション
    }
    
    /* コピー機能 */
    copyBtn.addEventListener('click', () => {
      if (!textInput.value) return;
      const originalHTML = copyBtn.innerHTML;
      navigator.clipboard.writeText(textInput.value).then(() => {
        copyBtn.innerHTML = '✅ コピー完了';
        copyBtn.disabled = true;
        setTimeout(() => {
          copyBtn.innerHTML = originalHTML;
          copyBtn.disabled = false;
        }, 2000);
      });
    });
    
    /* 全消去機能 */
    clearBtn.addEventListener('click', () => {
      if (!textInput.value) return;
      if (confirm('入力された文章をすべて消去しますか？')) {
        textInput.value = '';
        updateCount();
        textInput.focus();
      }
    });
    
    /* イベントリスナーの登録 */
    [textInput, includeSpaces, includeLineBreaks, includePunctuation].forEach(el => {
      const eventType = el.tagName === 'TEXTAREA' ? 'input' : 'change';
      el.addEventListener(eventType, updateCount);
    });
    
    // 初期実行
    updateCount();
  </script>

</body>
</html>
